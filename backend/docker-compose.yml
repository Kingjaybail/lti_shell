services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./routes:/app/routes
      - ./models:/app/models
      - ./main.py:/app/main.py
      - ./db.py:/app/db.py
    env_file:
      - .env
    environment:
      - LOCAL=false
    restart: unless-stopped

  sandbox:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    image: lti-shell:latest
    command: echo "sandbox image built"
